# ─────────────────────────────────────────────────────────────
# SECRET
# Credenciales de la base de datos, codificadas en base64 (no es
# cifrado real, pero las saca del manifiesto principal y evita
# dejarlas en texto plano dentro del Deployment).
# ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: marilyn-db-secret
  namespace: marilyn          # REEMPLAZABLE: debe coincidir con el "name" de marilyn-namespace.yml
type: Opaque
data:
  # Valores codificados en base64 de los defaults actuales de application.yaml (sa / mari1234).
  # Para generar el tuyo: echo -n "tu_valor" | base64
  DATABASE_USERNAME: c2E=            # REEMPLAZABLE: usuario de la base de datos del nuevo proyecto
  DATABASE_PASSWORD: bWFyaTEyMzQ=    # REEMPLAZABLE: password de la base de datos del nuevo proyecto
